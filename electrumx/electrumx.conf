# ────────────────────────────────────────────────────────────
# ElectrumX Configuration for MAZA Network
# ────────────────────────────────────────────────────────────

COIN = Mazacoin
NET = mainnet

# Daemon connection (mazad RPC — hostname "mazad" from docker-compose)
DAEMON_URL = http://mazarpc:CHANGE_ME_to_a_strong_password@mazad:12832/

# Database
DB_DIRECTORY = /data

# Services
SERVICES = tcp://0.0.0.0:50001,ssl://0.0.0.0:50002

# Peer discovery (off — we're the only MAZA Electrum server)
PEER_DISCOVERY = off
PEER_ANNOUNCE = off

# Performance
CACHE_MB = 1200
MAX_SESSIONS = 1000
BANDWIDTH_LIMIT = 5000000

# Logging
LOG_LEVEL = info
