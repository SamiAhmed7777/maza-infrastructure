# ────────────────────────────────────────────────────────────
# MAZA Network Daemon Configuration
# ────────────────────────────────────────────────────────────

# RPC settings (ElectrumX and Komodo DeFi connect here)
rpcuser=mazarpc
rpcpassword=CHANGE_ME_to_a_strong_password
rpcallowip=127.0.0.1
rpcallowip=10.0.0.0/8
rpcallowip=172.16.0.0/12
rpcallowip=192.168.0.0/16
server=1

# Network
listen=1
maxconnections=24
port=12835

# Indexing (REQUIRED for ElectrumX)
txindex=1

# Performance
dbcache=512
maxmempool=128

# Logging
shrinkdebuglog=1

# Seed node (official DNS seed)
# addnode=node.mazacoin.org
